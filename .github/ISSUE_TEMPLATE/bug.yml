name: Bug
about: Report incorrect behavior or a regression
title: "fix: "
labels: ["type:bug", "agent-ready"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. ..."
  - type: input
    id: scope
    attributes:
      label: Scope / package
      placeholder: package:pi-rules, package:dev-workflow, package:repo
  - type: textarea
    id: areas
    attributes:
      label: Affected files or areas
  - type: dropdown
    id: conflict-risk
    attributes:
      label: Conflict risk
      options:
        - Unknown
        - Low
        - Medium
        - High
  - type: dropdown
    id: release-impact
    attributes:
      label: Release impact
      options:
        - None
        - Patch
        - Minor
        - Major
        - Unknown
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: agent-notes
    attributes:
      label: Notes for agents
