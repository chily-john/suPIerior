  - id: maintainer-queue-lock-controls
    summary: Added queueing, lock PID tracking, stale-lock cleanup, status/log/kill commands, and queued batch draining for the background maintainer.

in_progress:
  - id: validate-maintainer-queue-kill-status
    priority: high
    status: pending-validation
    owner_hint: extension-src/pi-rules/maintainer/
    summary: Validate that queued maintainer batches, locks, stale-lock handling, kill command, and footer lifecycle behave correctly.
    acceptance_criteria:
      - When maintainer is already running, new changes are queued instead of skipped.
      - When the active maintainer exits, exactly one queued batch starts automatically.
      - /pi-rules:maintainer-status shows PID, running/stale state, current files, pending batches, and log path.
      - /pi-rules:maintainer-kill terminates the stuck child process without killing the main Pi process.
      - Old/bad locks that point at the current Pi process are cleared safely.
      - Footer shows running, then done/error, then clears after the expected delay.
    suggested_checks:
      - Create a fake or long-running maintainer process scenario and verify queue.json grows.
      - Kill/exit the process and verify queue drains.
      - Simulate stale maintainer.lock with a dead PID.
      - Simulate maintainer.lock with process.pid and verify it does not kill Pi.

  - id: validate-maintainer-quality
    priority: high
    status: pending-validation
    owner_hint: skills/rules-maintainer/ and .pi/rules/ in a target project
    summary: Verify the isolated maintainer updates sibling inventory.md files and rules appropriately across realistic code changes.
    scenarios:
      - New reusable component creation should update matching inventory.md when significant.
      - Component removal should remove or mark stale inventory entries.
      - Rename/move should update paths without duplicate stale entries.
      - Trivial formatting-only/source-only edits should usually be skipped.
      - Maintainer should not alter unrelated source files.
    acceptance_criteria:
      - Maintainer changes are scoped to .pi/rules/ unless explicitly justified by skill instructions.
      - Inventories remain sibling inventory.md files, not inline tables in main rules.
      - Main-agent context stays clean; maintainer output appears only in log/footer notifications.

  - id: reduce-unnecessary-source-exploration
    priority: medium
    status: planned
    owner_hint: extension-src/pi-rules/routing/ and injection/
    summary: Tune injected guidance/routing behavior so the main agent avoids unnecessary ls/find and repeated example reads.
    constraints:
      - Do not block source reads needed to verify actual APIs or local implementation style.
      - Do not inject context for non-codebase-specific/general questions.
      - Prefer metadata-driven routing rather than hardcoded project-specific behavior.
    possible_approaches:
      - Strengthen injected guidance only if current behavior still causes excessive exploration.
      - Improve rule summaries/triggers produced by init templates.
      - Add diagnostics to show why a rule was selected and which metadata matched.

next_steps:
  - id: fix-maintainer-lifecycle-windows
    priority: high
    status: planned
    owner_hint: extension-src/pi-rules/maintainer/service.ts and ui/presenter.ts
    summary: Fix maintainer runs that hang forever, flash terminals, or leave the footer stuck on running, especially on Windows.
    observed_issues:
      - /pi-rules:maintainer-status can continue to show running indefinitely.
      - The footer can remain on Maintainer: running until /pi-rules:maintainer-kill is used.
      - A terminal window may flash while background maintenance is running or being spawned.
      - Logs show new maintainer jobs starting, but not always completing with useful updates.
    investigation:
      - Verify whether the maintainer child process actually exits or hangs.
      - Verify whether child exit/close callbacks fire reliably when spawned through pi.cmd/shell/detached mode on Windows.
      - Check whether the recorded PID is the useful maintainer process, a shell wrapper, or a stale child.
      - Confirm queue draining does not immediately start unexpected follow-up jobs.
      - Reconcile footer/status with actual lock and process state so UI cannot lie indefinitely.
    possible_fixes:
      - Avoid shell: true or detached spawning on Windows if a direct Node/CLI entrypoint is available.
      - Add safer timeout or stale-lock reconciliation behavior.
      - Persist clearer running/completed state for the active batch.
      - Improve footer lifecycle so maintainer status can display concurrently with selected rules injection status, ideally with maintainer status positioned separately/far right if Pi UI supports it.
    acceptance_criteria:
      - Maintainer completion clears lock and updates/clears footer without requiring kill.
      - /pi-rules:maintainer-status agrees with real process state.
      - No visible terminal flashing during normal background maintenance on Windows.
      - Kill command still terminates only the maintainer process and clears the UI state.

  - id: improve-presenter-footer-layout
    priority: high
    status: planned
    owner_hint: extension-src/pi-rules/ui/presenter.ts
    summary: Add a richer presenter/footer abstraction so multiple pi-rules messages can be shown together instead of competing for one status slot.
    rationale:
      - Rule selection status and maintainer status should be visible at the same time.
      - Future status messages may need independent lifecycle/clear timing without overwriting unrelated footer content.
      - Footer text may need left/right positioning or column alignment so short operational status can sit apart from selected-rule context.
    investigation:
      - First check whether Pi already supports multiple footer/status items, alignment, columns, or keyed status regions beyond the current ctx.ui.setStatus usage.
      - If built-in support exists, wrap it behind the pi-rules presenter instead of duplicating layout logic.
      - If built-in support is limited, create pi-rules presenter functions that compose multiple footer messages into one rendered footer string.
    possible_approaches:
      - Add presenter-level footer slots keyed by purpose, such as rules, maintainer, validation, and transient notices.
      - Allow each slot to declare side/alignment, priority, and clear timing.
      - Render all active slots together using column-style alignment, for example selected rules on the left and maintainer state on the right when terminal width/layout allows.
      - Keep public callers using semantic presenter methods rather than calling Pi footer/status APIs directly.
    acceptance_criteria:
      - Multiple active footer messages can be added and displayed together.
      - Clearing one message does not clear or overwrite unrelated footer messages.
      - Rule footer/status still shows useful selected-rule information alongside maintainer status.
      - Presenter code documents whether it uses an existing Pi capability or a local composition fallback.

  - id: inject-full-parent-rules
    priority: high
    status: planned
    owner_hint: extension-src/pi-rules/routing/selector.ts and injection/prompt.ts
    summary: Treat parent rules as mandatory inherited guidance by injecting their full content, not just summaries.
    rationale:
      - Important constraints may live in parent rules by design and should not be duplicated into every child rule.
      - Current parent summaries are routing/display context only and may omit mandatory body guidance.
      - Example failure: a parent component rule says prop definitions belong in custom-types/components, but a vague component edit placed props directly in the component file.
    behavior:
      - When a child rule is selected, inject applicable parent rule bodies as inherited rules.
      - Order inherited context from broader parent rules to more specific child rules.
      - Keep summaries/triggers as routing metadata for now; do not rely on summaries to convey mandatory behavior.
    acceptance_criteria:
      - A vague edit request under a child scope receives parent constraints in injected context.
      - Mandatory parent guidance is followed without duplicating it into child rule files.
      - Rule footer/status still shows useful selected-rule information alongside maintainer status.

  - id: brainstorm-better-rule-injection-and-review
    priority: medium
    status: idea
    owner_hint: extension-src/pi-rules/injection/, routing/, and possible future reviewer/planning feature
    summary: Brainstorm how to provide better rule injection throughout an agent's work, not only at turn start.
    rationale:
      - The current injector is turn-scoped; once implementation uncovers new files or paths, the agent may need additional applicable rules.
      - Ideal behavior would let agents receive relevant rules as they work, when navigation or edits reveal a more specific scope.
      - More realistically, this may belong in a separate integrated planning/implementing/reviewing workflow with a code reviewer that is explicitly rules-aware.
    exploration:
      - Evaluate whether Pi lifecycle/tool hooks can safely trigger supplemental rule injection during a turn without confusing the main agent context.
      - Consider a rules-aware reviewer that checks changed files against applicable `.pi/rules` after implementation and flags missed guidance.
      - Consider how a future planning/implementing/reviewing system could make rules selection an explicit step in each phase.
      - Keep this as design exploration until the simpler inherited-parent injection and validation work is stable.
    acceptance_criteria:
      - Document viable approaches and tradeoffs for mid-work rule updates versus a separate rules-aware review phase.
      - Identify Pi API/event support needed for any continuous or phase-based injection design.
      - Avoid adding complex reviewer/planner machinery directly to the current injector without a clear architecture.

  - id: robust-batch-queue-processing
    priority: high
    status: planned
    owner_hint: extension-src/pi-rules/maintainer/service.ts
    summary: Make queue processing more robust than one-batch-at-a-time callback chaining, allowing non-conflicting batches to run concurrently.
    pushback: Avoid building a full job runner unless validation proves current callback chaining is insufficient.
    ideas:
      - Add a drainQueue(cwd) service that owns the loop and lock transitions.
      - Persist currently-running batch details separately from queued pending batches.
      - Record the file set each active maintenance lock/run intends to edit, using maintainer change-tracking data where possible.
      - Replace the current global mutex-style lock with a semaphore-style scheduler keyed by edited files: if the next queued item does not overlap any active run's file set, start it too.
      - Keep overlapping batches serialized, and consider coalescing multiple queued batches with overlapping changed files.
      - Add protection against infinite retry loops when a batch repeatedly fails.
    acceptance_criteria:
      - Active lock/run state lists the files being edited or protected by that run.
      - Queue draining can start multiple pending batches when their protected file sets do not overlap.
      - Batches with overlapping file sets remain serialized to avoid conflicting writes.
      - Status/queue output makes concurrent active runs and their file sets understandable.

  - id: hard-enforced-maintainer-semaphore
    priority: medium
    status: planned
    owner_hint: extension-src/pi-rules/maintainer/ and skills/rules-maintainer/
    summary: Explore true maintainer semaphore enforcement after advisory protected-rule scheduling is stable.
    ideas:
      - Introduce lock-aware edit/write tooling or a manager-mediated patch API so maintainer agents cannot bypass per-file `.pi/rules` locks.
      - Let maintainer agents request exact `.pi/rules` files they intend to update and block or requeue until all requested files are available.
      - Consider manager-applied patches before heavier worktree isolation.
      - Defer git worktrees and resolver agents unless advisory scheduling still allows real conflicts.
    acceptance_criteria:
      - Actual `.pi/rules` writes are enforced by the manager/tool layer, not only by prompt instructions.
      - Agents can safely request additional rule-file locks discovered during analysis.
      - Crash recovery clears or repairs stale per-file locks without corrupting rule files.

