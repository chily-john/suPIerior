architectural_principles:
  - Keep DDD boundaries pragmatic: domain-oriented modules, not enterprise ceremony.
  - Preserve deep modules: expose simple service interfaces and hide lock/queue/spawn/UI complexity inside modules.
  - Only ui/presenter.ts should directly manage Pi footer/status/notification policy, unless a later prompt library replaces it.
  - Keep injection pure: injection formats prompt text and should not manage UI or filesystem state.
  - Keep routing/indexing decoupled: routing selects from an index and should not read files itself.
  - Keep maintainer isolated from the main agent context; background work should remain an isolated Pi subprocess.
  - Do not modify or overwrite the older Claude plugin under plugins/pi-rules/.

open_questions:
  - Should queue batches be coalesced by file path, by rule scope, or preserved exactly as separate turns?
  - Should failed maintainer batches remain in queue, move to a dead-letter file, or simply log and continue?
  - How aggressive should stale-lock max age be by default?
  - Should /pi-rules:maintain support directories/globs or only explicit changed files?
  - Should config live at .pi/pi-rules.json, AGENTS.md frontmatter, package-level config, or some combination?
  - Do we eventually want a model-based or hybrid rule selector, or should routing remain deterministic metadata scoring?
